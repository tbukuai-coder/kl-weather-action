name: Daily Quote

on:
  schedule:
    # 6 AM MYT = 22:00 UTC previous day
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  send-quote:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch daily quote
        id: quote
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, random

          quote = None
          author = None

          # Try zenquotes.io first (daily curated quote)
          try:
              req = urllib.request.Request("https://zenquotes.io/api/today",
                  headers={"User-Agent": "Mozilla/5.0"})
              with urllib.request.urlopen(req, timeout=8) as resp:
                  data = json.loads(resp.read())[0]
                  quote = data["q"]
                  author = data["a"]
          except Exception:
              pass

          # Fallback: type.fit random quote
          if not quote:
              try:
                  req = urllib.request.Request("https://type.fit/api/quotes",
                      headers={"User-Agent": "Mozilla/5.0"})
                  with urllib.request.urlopen(req, timeout=8) as resp:
                      quotes = json.loads(resp.read())
                      q = random.choice(quotes)
                      quote = q["text"]
                      author = q.get("author", "Unknown")
              except Exception:
                  quote = "The only way to do great work is to love what you do."
                  author = "Steve Jobs"

          lines = [
              "💬 <i>\"{}\"</i>".format(quote),
              "",
              "— <b>{}</b>".format(author),
          ]

          msg = "\n".join(lines)

          delim = os.urandom(4).hex()
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("message<<{}\n{}\n{}\n".format(delim, msg, delim))
          PYEOF

      - name: Send to Telegram
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_GROUP_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          message: ${{ steps.quote.outputs.message }}
