name: Daily Quote

on:
  schedule:
    # 6 AM MYT = 22:00 UTC previous day
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  send-quote:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch daily quote
        id: quote
        run: |
          JSON=$(curl -s --max-time 10 "https://zenquotes.io/api/today")
          export JSON
          python3 << 'PYEOF'
          import json, os

          data = json.loads(os.environ["JSON"])[0]
          quote = data["q"]
          author = data["a"]
          date = data.get("date", "")

          lines = [
              "💬 <i>\"{}\"</i>".format(quote),
              "",
              "— <b>{}</b>".format(author),
          ]
          if date:
              lines.append("")
              lines.append("📅 {}".format(date))

          msg = "\n".join(lines)

          delim = os.urandom(4).hex()
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("message<<{}\n{}\n{}\n".format(delim, msg, delim))
          PYEOF

      - name: Send to Telegram
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_GROUP_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          message: ${{ steps.quote.outputs.message }}
