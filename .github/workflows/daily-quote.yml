name: Daily Quote

on:
  schedule:
    # 6 AM MYT = 22:00 UTC previous day
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  send-quote:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch daily quote
        id: quote
        run: |
          # Fetch English quote (zenquotes)
          EN_JSON=$(curl -s --max-time 10 "https://zenquotes.io/api/today")

          # Fetch Chinese quote (xygeng.cn)
          CN_JSON=$(curl -s --max-time 10 "https://api.xygeng.cn/one")

          export EN_JSON CN_JSON

          python3 << 'PYEOF'
          import json, os

          # Parse English quote
          en_data = json.loads(os.environ["EN_JSON"])[0]
          en_quote = en_data["q"]
          en_author = en_data["a"]

          # Parse Chinese quote
          cn_data = json.loads(os.environ["CN_JSON"])["data"]
          cn_quote = cn_data["content"]
          cn_origin = cn_data.get("origin", "")
          cn_name = cn_data.get("name", "")

          lines = [
              "💬 <i>\"{}\"</i>".format(en_quote),
              "",
              "— <b>{}</b>".format(en_author),
              "",
              "━━━━━━━━━━━━━━",
              "",
              "📖 「{}」".format(cn_quote),
          ]
          if cn_origin:
              lines.append("— 《{}》".format(cn_origin))
          elif cn_name and cn_name != "佚名":
              lines.append("— {}".format(cn_name))

          msg = "\n".join(lines)

          delim = os.urandom(4).hex()
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("message<<{}\n{}\n{}\n".format(delim, msg, delim))
          PYEOF

      - name: Send to Telegram
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_GROUP_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          message: ${{ steps.quote.outputs.message }}
