name: KL Weather

on:
  schedule:
    # 6 AM MYT = 22:00 UTC | 12 PM MYT = 04:00 UTC
    - cron: "0 4,22 * * *"
  workflow_dispatch:

jobs:
  fetch-weather:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch weather
        id: weather
        run: |
          JSON=$(curl -s "wttr.in/Kuala+Lumpur?format=j1")
          export JSON
          python3 << 'PYEOF'
          import json, subprocess, os

          data = json.loads(os.environ["JSON"])
          cc = data["current_condition"][0]
          code = cc["weatherCode"]

          rain_codes = {"176","293","296","299","302","305","308"}
          storm_codes = {"179","182","185","227","230","248","260","263","266","281","284","311","314","317","320","323","326","329","332","335","338","350","353","356","359","362","365","368","371","374","377","386","389"}

          if code == "113":           icon, label = "☀️", "Sunny"
          elif code == "116":         icon, label = "⛅", "Partly cloudy"
          elif code in ("119","122"): icon, label = "☁️", "Cloudy"
          elif code == "143":         icon, label = "🌫️", "Misty"
          elif code in rain_codes:    icon, label = "🌧️", "Rain"
          elif code in storm_codes:   icon, label = "⛈️", "Storm"
          else:                       icon, label = "🌤️", "Unknown"

          temp = cc["temp_C"]

          # Check rain chance for next hour
          hourly = data["weather"][0]["hourly"]
          cur_hour = int(subprocess.check_output(
              ["date", "+%H"],
              env={**os.environ, "TZ": "Asia/Kuala_Lumpur"}
          ).decode().strip())
          next_idx = (cur_hour + 1) // 3
          rain_chance = int(hourly[next_idx]["chanceofrain"]) if next_idx < len(hourly) else 0

          lines = [f"{icon} <b>{label}</b> — {temp}°C"]

          if rain_chance > 50:
              lines.append(f"☂️ Bring an umbrella! {rain_chance}% rain expected in the next hour.")

          msg = "\n".join(lines)

          delim = os.urandom(4).hex()
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"message<<{delim}\n{msg}\n{delim}\n")
          PYEOF

      - name: Send to Telegram
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_GROUP_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          message: ${{ steps.weather.outputs.message }}
