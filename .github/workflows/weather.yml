name: Fetch Kuala Lumpur Weather

on:
  schedule:
    # Runs daily at 08:00 Malaysia time (UTC+8) = 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  fetch-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch weather for Kuala Lumpur
        run: |
          echo "=== 🌤️ Kuala Lumpur Weather — $(date -u +%Y-%m-%d) ==="
          curl -s "wttr.in/Kuala+Lumpur?format=j1" | jq '{
            location: .nearest_area[0].areaName[0].value,
            country:  .nearest_area[0].country[0].value,
            temp_C:   .current_condition[0].temp_C,
            feels_C:  .current_condition[0].FeelsLikeC,
            humidity: .current_condition[0].humidity,
            desc:     .current_condition[0].weatherDesc[0].value,
            wind_kmph: .current_condition[0].windspeedKmph,
            wind_dir:  .current_condition[0].winddir16Point,
            visibility: .current_condition[0].visibility,
            uv_index:   .current_condition[0].uvIndex,
            forecasts: [.weather[] | {
              date: .date,
              max_C: .maxtempC,
              min_C: .mintempC,
              sunrise: .astronomy[0].sunrise,
              sunset:  .astronomy[0].sunset,
              hourly: [.hourly[] | {
                time: .time,
                temp_C: .tempC,
                desc: .weatherDesc[0].value,
                chance_of_rain: .chanceofrain,
                humidity: .humidity
              }]
            }]
          }' > weather.json

          echo ""
          echo "=== Summary ==="
          curl -s "wttr.in/Kuala+Lumpur?format=%l:+%c+%t+(feels+%f),+Humidity:+%h,+Wind:+%w"

      - name: Upload weather artifact
        uses: actions/upload-artifact@v4
        with:
          name: kl-weather-${{ github.run_id }}
          path: weather.json
          retention-days: 7
