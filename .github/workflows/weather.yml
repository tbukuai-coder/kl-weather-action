name: Fetch Kuala Lumpur Weather

on:
  schedule:
    # Runs daily at 08:00 Malaysia time (UTC+8) = 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  fetch-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch weather for Kuala Lumpur
        id: weather
        run: |
          JSON=$(curl -s "wttr.in/Kuala+Lumpur?format=j1")

          # Extract current conditions
          TEMP=$(echo "$JSON" | jq -r '.current_condition[0].temp_C')
          FEELS=$(echo "$JSON" | jq -r '.current_condition[0].FeelsLikeC')
          HUMIDITY=$(echo "$JSON" | jq -r '.current_condition[0].humidity')
          DESC=$(echo "$JSON" | jq -r '.current_condition[0].weatherDesc[0].value')
          WIND_SPEED=$(echo "$JSON" | jq -r '.current_condition[0].windspeedKmph')
          WIND_DIR=$(echo "$JSON" | jq -r '.current_condition[0].winddir16Point')
          UV=$(echo "$JSON" | jq -r '.current_condition[0].uvIndex')
          VISIBILITY=$(echo "$JSON" | jq -r '.current_condition[0].visibility')

          # Weather emoji mapping
          case "$DESC" in
            *Sunny*|*Clear*) ICON="☀️" ;;
            *Partly*cloudy*|*Cloudy*) ICON="⛅" ;;
            *Overcast*) ICON="☁️" ;;
            *Rain*|*Drizzle*|*shower*) ICON="🌧️" ;;
            *Thunder*|*storm*) ICON="⛈️" ;;
            *Fog*|*Mist*) ICON="🌫️" ;;
            *Snow*) ICON="❄️" ;;
            *) ICON="🌤️" ;;
          esac

          # Today's forecast
          TODAY_MAX=$(echo "$JSON" | jq -r '.weather[0].maxtempC')
          TODAY_MIN=$(echo "$JSON" | jq -r '.weather[0].mintempC')
          SUNRISE=$(echo "$JSON" | jq -r '.weather[0].astronomy[0].sunrise')
          SUNSET=$(echo "$JSON" | jq -r '.weather[0].astronomy[0].sunset')

          # Tomorrow's forecast
          TMR_MAX=$(echo "$JSON" | jq -r '.weather[1].maxtempC')
          TMR_MIN=$(echo "$JSON" | jq -r '.weather[1].mintempC')
          TMR_DESC=$(echo "$JSON" | jq -r '.weather[1].hourly[4].weatherDesc[0].value')

          # Build hourly rain forecast (next 12 hours)
          HOURLY=$(echo "$JSON" | jq -r '
            .weather[0].hourly[:4] |
            .[] | "\(.time | tonumber / 100 | tostring + ":00") — \(.tempC)°C \(.weatherDesc[0].value) 🌧️\(.chanceofrain)%"
          ')

          # Compose message
          MSG="${ICON} <b>Kuala Lumpur Weather</b> — $(date -u +%Y-%m-%d)

🌡️ <b>${DESC}</b>
   Temp: <b>${TEMP}°C</b> (feels ${FEELS}°C)
   📊 Today: ${TODAY_MIN}°C – ${TODAY_MAX}°C
   💧 Humidity: ${HUMIDITY}%
   💨 Wind: ${WIND_SPEED} km/h ${WIND_DIR}
   👁️ Visibility: ${VISIBILITY} km
   ☀️ UV Index: ${UV}
   🌅 Sunrise: ${SUNRISE} | Sunset: ${SUNSET}

<b>⏰ Next few hours:</b>
${HOURLY}

<b>📅 Tomorrow:</b> ${TMR_MIN}°C – ${TMR_MAX}°C, ${TMR_DESC}"

          # Save for next step
          echo "message<<EOF" >> "$GITHUB_OUTPUT"
          echo "$MSG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          # Also save full JSON artifact
          echo "$JSON" | jq '.' > weather.json

          echo ""
          echo "=== Summary ==="
          curl -s "wttr.in/Kuala+Lumpur?format=%l:+%c+%t+(feels+%f),+Humidity:+%h,+Wind:+%w"

      - name: Send to Telegram
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_GROUP_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          message: ${{ steps.weather.outputs.message }}

      - name: Upload weather artifact
        uses: actions/upload-artifact@v4
        with:
          name: kl-weather-${{ github.run_id }}
          path: weather.json
          retention-days: 7
