name: KL Weather

on:
  schedule:
    - cron: "0 22 * * *"
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  fetch-weather:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch weather
        id: weather
        run: |
          JSON=$(curl -s "wttr.in/Kuala+Lumpur?format=j1")
          CODE=$(echo "$JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['current_condition'][0]['weatherCode'])")
          case "$CODE" in
            113) ICON="☀️";  LABEL="Sunny" ;;
            116) ICON="⛅";  LABEL="Partly cloudy" ;;
            119|122) ICON="☁️"; LABEL="Cloudy" ;;
            143) ICON="🌫️";  LABEL="Misty" ;;
            176|293|296|299|302|305|308) ICON="🌧️"; LABEL="Rain" ;;
            179|182|185|227|230|248|260|263|266|281|284|311|314|317|320|323|326|329|332|335|338|350|353|356|359|362|365|368|371|374|377|386|389) ICON="⛈️"; LABEL="Storm" ;;
            *)   ICON="🌤️";  LABEL="Unknown" ;;
          esac
          TEMP=$(echo "$JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['current_condition'][0]['temp_C'])")
          DATE=$(TZ="Asia/Kuala_Lumpur" date +"%A, %d %B %Y — %I:%M %p MYT")
          MSG="${ICON} <b>${LABEL}</b> — ${TEMP}°C

${DATE}"
          echo "message=${MSG}" >> "$GITHUB_OUTPUT"

      - name: Send to Telegram
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_GROUP_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          message: ${{ steps.weather.outputs.message }}
